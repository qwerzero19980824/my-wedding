<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cml & zy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, Sans-Serif; 
            background: #fafafa; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 90%;
            width: 400px;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        /* 点击翻转动画 */
        .card.flipped { transform: rotateY(180deg); }
        .front, .back { backface-visibility: hidden; }
        .back { transform: rotateY(180deg); position: absolute; top: 30px; left: 0; right: 0; color: #e74c3c; }
        h1 { font-size: 24px; color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card" onclick="this.classList.toggle('flipped')">
        <div class="front">
            <h1>cml & zy</h1>
            <p>这是一个纯 HTML 交互测试页面</p>
            <p style="margin-top: 20px; color: #aaa; font-size: 12px;">👇 点击卡片试试看</p>
        </div>
        <div class="back">
            <h2>❤️</h2>
            <p style="margin-top: 10px;">这是卡片的背面！交互成功啦！</p>
        </div>
    </div>

</body>
</html>
